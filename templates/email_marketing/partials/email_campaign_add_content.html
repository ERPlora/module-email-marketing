{% load djicons i18n %}
<div data-back-url="{% url 'email_marketing:email_campaigns_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Emailcampaign" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'email_marketing:email_campaigns_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-email_campaign-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-email_campaign-form"
          hx-post="{% url 'email_marketing:email_campaign_add' %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <input type="text" name="status" class="input input-sm w-full" placeholder="{% trans 'Status' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Scheduled At" %}</label>
                <input type="datetime-local" name="scheduled_at" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Sent Count" %}</label>
                <input type="number" name="sent_count" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Open Count" %}</label>
                <input type="number" name="open_count" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Click Count" %}</label>
                <input type="number" name="click_count" class="input input-sm w-full"  placeholder="0">
                </div>
            </div>
        </div>
    </form>
</div>
